<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg"><style>
.enter{animation:bpEnter .7s cubic-bezier(.2,.9,.3,1.25) both}
.bob{animation:bpBob 3s ease-in-out infinite}
.bob2{animation:bpBob 3.7s ease-in-out infinite}
.sway{animation:bpSway 4s ease-in-out infinite;transform-box:fill-box;transform-origin:bottom center}
.flutter{animation:bpFlutter 3.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.twinkle{animation:bpTwinkle 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.spin{animation:bpSpin 24s linear infinite;transform-box:fill-box;transform-origin:center}
@keyframes bpEnter{0%{opacity:0;transform:translateY(28px)}100%{opacity:1;transform:translateY(0)}}
@keyframes bpBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bpSway{0%,100%{transform:rotate(-3.5deg)}50%{transform:rotate(3.5deg)}}
@keyframes bpFlutter{0%{transform:translate(0,0) rotate(-7deg)}50%{transform:translate(12px,-14px) rotate(7deg)}100%{transform:translate(0,0) rotate(-7deg)}}
@keyframes bpTwinkle{0%,100%{opacity:.55;transform:scale(.8)}50%{opacity:1;transform:scale(1.18)}}
@keyframes bpSpin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.enter,.bob,.bob2,.sway,.flutter,.twinkle,.spin{animation:none}}
</style><defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#bfe6ff"/><stop offset="1" stop-color="#eaf7ff"/></linearGradient><linearGradient id="grass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9ad36f"/><stop offset="1" stop-color="#84c457"/></linearGradient></defs><rect x="0" y="0" width="480" height="360" rx="0" fill="url(#sky)" /><circle cx="240" cy="48" r="48" fill="#ffe89a" opacity="0.45"/><g class="spin"><line x1="280.5" y1="48" x2="291" y2="48" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="275.07" y1="68.25" x2="284.17" y2="73.5" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="260.25" y1="83.07" x2="265.5" y2="92.17" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="240" y1="88.5" x2="240" y2="99" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="219.75" y1="83.07" x2="214.5" y2="92.17" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="204.93" y1="68.25" x2="195.83" y2="73.5" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="199.5" y1="48" x2="189" y2="48" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="204.93" y1="27.75" x2="195.83" y2="22.5" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="219.75" y1="12.93" x2="214.5" y2="3.83" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="240" y1="7.5" x2="240" y2="-3" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="260.25" y1="12.93" x2="265.5" y2="3.83" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="275.07" y1="27.75" x2="284.17" y2="22.5" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/></g><circle cx="240" cy="48" r="30" fill="#ffd24d" /><ellipse cx="330" cy="80.4" rx="39" ry="14.3" fill="#ffffff" /><circle cx="311.8" cy="72.6" r="15.6" fill="#ffffff" /><circle cx="330" cy="62.2" r="20.28" fill="#ffffff" /><circle cx="349.5" cy="71.3" r="16.12" 