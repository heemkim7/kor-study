<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg"><style>
.enter{animation:bpEnter .7s cubic-bezier(.2,.9,.3,1.25) both}
.bob{animation:bpBob 3s ease-in-out infinite}
.bob2{animation:bpBob 3.7s ease-in-out infinite}
.sway{animation:bpSway 4s ease-in-out infinite;transform-box:fill-box;transform-origin:bottom center}
.flutter{animation:bpFlutter 3.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.twinkle{animation:bpTwinkle 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.spin{animation:bpSpin 24s linear infinite;transform-box:fill-box;transform-origin:center}
@keyframes bpEnter{0%{opacity:0;transform:translateY(28px)}100%{opacity:1;transform:translateY(0)}}
@keyframes bpBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bpSway{0%,100%{transform:rotate(-3.5deg)}50%{transform:rotate(3.5deg)}}
@keyframes bpFlutter{0%{transform:translate(0,0) rotate(-7deg)}50%{transform:translate(12px,-14px) rotate(7deg)}100%{transform:translate(0,0) rotate(-7deg)}}
@keyframes bpTwinkle{0%,100%{opacity:.55;transform:scale(.8)}50%{opacity:1;transform:scale(1.18)}}
@keyframes bpSpin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.enter,.bob,.bob2,.sway,.flutter,.twinkle,.spin{animation:none}}
</style><defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#bfe6ff"/><stop offset="1" stop-color="#eaf7ff"/></linearGradient><linearGradient id="grass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9ad36f"/><stop offset="1" stop-color="#84c457"/></linearGradient></defs><rect x="0" y="0" width="480" height="360" rx="0" fill="url(#sky)" /><circle cx="64" cy="58" r="48" fill="#ffe89a" opacity="0.45"/><g class="spin"><line x1="104.5" y1="58" x2="115" y2="58" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="99.07" y1="78.25" x2="108.17" y2="83.5" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="84.25" y1="93.07" x2="89.5" y2="102.17" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="64" y1="98.5" x2="64" y2="109" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="43.75" y1="93.07" x2="38.5" y2="102.17" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="28.93" y1="78.25" x2="19.83" y2="83.5" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="23.5" y1="58" x2="13" y2="58" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="28.93" y1="37.75" x2="19.83" y2="32.5" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="43.75" y1="22.93" x2="38.5" y2="13.83" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="64" y1="17.5" x2="64" y2="7" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="84.25" y1="22.93" x2="89.5" y2="13.83" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/><line x1="99.07" y1="37.75" x2="108.17" y2="32.5" stroke="#ffe89a" stroke-width="5" stroke-linecap="round"/></g><circle cx="64" cy="58" r="30" fill="#ffd24d" /><ellipse cx="330" cy="80.4" rx="39" ry="14.3" fill="#ffffff" /><circle cx="311.8" cy="72.6" r="15.6" fill="#ffffff" /><circle cx="330" cy="62.2" r="20.28" fill="#ffffff" /><circle cx="349.5" cy="71.3" r="16.12" fill="#ffffff" />