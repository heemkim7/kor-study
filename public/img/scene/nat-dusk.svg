<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg"><style>
.enter{animation:bpEnter .7s cubic-bezier(.2,.9,.3,1.25) both}
.bob{animation:bpBob 3s ease-in-out infinite}
.bob2{animation:bpBob 3.7s ease-in-out infinite}
.sway{animation:bpSway 4s ease-in-out infinite;transform-box:fill-box;transform-origin:bottom center}
.flutter{animation:bpFlutter 3.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.twinkle{animation:bpTwinkle 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.spin{animation:bpSpin 24s linear infinite;transform-box:fill-box;transform-origin:center}
@keyframes bpEnter{0%{opacity:0;transform:translateY(28px)}100%{opacity:1;transform:translateY(0)}}
@keyframes bpBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bpSway{0%,100%{transform:rotate(-3.5deg)}50%{transform:rotate(3.5deg)}}
@keyframes bpFlutter{0%{transform:translate(0,0) rotate(-7deg)}50%{transform:translate(12px,-14px) rotate(7deg)}100%{transform:translate(0,0) rotate(-7deg)}}
@keyframes bpTwinkle{0%,100%{opacity:.55;transform:scale(.8)}50%{opacity:1;transform:scale(1.18)}}
@keyframes bpSpin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.enter,.bob,.bob2,.sway,.flutter,.twinkle,.spin{animation:none}}
</style><defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2b2c63"/><stop offset="0.6" stop-color="#4a4a8c"/><stop offset="1" stop-color="#7b6aa6"/></linearGradient><linearGradient id="grass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#46617a"/><stop offset="1" stop-color="#374f63"/></linearGradient></defs><rect x="0" y="0" width="480" height="360" rx="0" fill="url(#sky)" /><g class="twinkle" style="animation-delay:0s"><path d="M 40 36 L 41.04 38.96 L 44 40 L 41.04 41.04 L 40 44 L 38.96 41.04 L 36 40 L 38.96 38.96 Z" fill="#fff3c4" /></g><g class="twinkle" style="animation-delay:0.35s"><path d="M 90 77 L 90.78 79.22 L 93 80 L 90.78 80.78 L 90 83 L 89.22 80.78 L 87 80 L 89.22 79.22 Z" fill="#fff3c4" /></g><g class="twinkle" style="animation-delay:0.7s"><path d="M 150 47 L 151.3 50.7 L 155 52 L 151.3 53.3 L 150 57 L 148.7 53.3 L 145 52 L 148.7 50.7 Z" fill="#fff3c4" /></g><g class="twinkle" style="animation-delay:1.05s"><path d="M 210 89 L 210.78 91.22 L 213 92 L 210.78 92.78 L 210 95 L 209.22 92.78 L 207 92 L 209.22 91.22 Z" fill="#fff3c4" /></g><g class="twinkle" style="animation-delay:1.4s"><path d="M 300 42 L 301.04 44.96 L 304 46 L 301.04 47.04 L 300 50 L 298.96 47.04 L 296 46 L 298.96 44.96 Z" fill="#fff3c4" /></g><g class="twinkle" style="animation-delay:1.75s"><path d="M 360 83 L 360.78 85.22 L 363 86 L 360.78 86.78 L 360 89 L 359.22 86.78 L 357 86 L 359.22 85.22 Z" fill="#fff3c4" /></g><g class="twinkle" style="animation-delay:0s"><path d="M 430 51 L 431.3 54.7 L 435 56 L 431.3 57.3 L 430 61 L 428.7 57.3 L 425 56 L 428.7 54.7 Z" fill="#fff3c4" /></g><g class="twinkle" style="animation-delay:0.35s"><path d="M 462 109 L 462.78 111.22 L 465 112 L 462.78 112.78 L 462 115 L 461.22 112.78 L 459 112 L 461.22 111.22 Z" fill="#fff3c4" /></g><g class="twinkle" style="animation-delay:0.7s"><path d="M 120 121 L 120.78 123.22 L 123 124 L 120.78 124.78 L 120 127 L 119.22 124.78 L 117 124 L 119.22 123.22 Z" fill="#fff3c4" 